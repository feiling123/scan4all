version: 2
env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
project_name: scan4all
builds:
  - id: scan4all-darwin
    ldflags:
      - -s -w
    binary: scan4all
    env:
      - CGO_ENABLED=1
    main: main.go
    goos:
      - darwin
    goarch:
      - amd64

archives:
  - formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_macOS_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}-mac-checksums.txt"
